<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding @ GSW</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <main class="page-shell">
        <section class="layout-grid" aria-label="Onboarding presentation and welcome message">
            <article class="hero-card">
                <div class="hero-copy">
                    <p class="eyebrow">Onboarding</p>
                    <h1>Hello, Welcome to Siemens</h1>
                    <p class="intro">
                        Scan the QR code for the password, then review the presentation on the right.
                    </p>
                </div>

                <div class="qr-card" aria-label="QR code for password access">
                    <img src="assets/password-qr.png" alt="QR code for the password">
                    <p>Scan for the password</p>
                </div>
            </article>

            <article class="presentation-card" aria-label="Presentation preview">
                <div class="section-heading">
                    <p class="eyebrow">Presentation</p>
                    <h2>Onboarding @ GSW</h2>
                </div>

                <div class="presentation-frame">
                    <iframe
                        class="presentation-embed"
                        src="assets/Onboarding%20@%20GSW.pdf"
                        title="Onboarding @ GSW presentation"
                    ></iframe>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
